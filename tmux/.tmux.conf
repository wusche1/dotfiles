# Enable 256 color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Change prefix to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Enable mouse support
set -g mouse on

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Enable vi mode
setw -g mode-keys vi

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Make new windows start after current
bind c new-window -a -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

# Copy mode improvements
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Allow passthrough and clipboard
set -g allow-passthrough on
set -s set-clipboard on

# Visual styling (Kanagawa theme)
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=default'
set -g window-status-style "bg=default"
set -g status-bg default
set -g window-status-current-style "bg=default"
set -g status-interval 1
set -g status-left '#(~/.local/bin/tmux-sessions)'
set -g status-left-length 100
set -g status-right ''

set -g pane-border-lines single
set -g pane-border-style 'fg=#54546D'
set -g pane-active-border-style 'fg=#957FB8'
setw -g window-status-separator ''
setw -g window-status-current-format '  #I #W #F  '
setw -g window-status-format '  #I #W #F  '
setw -g window-status-current-style 'bg=#C8C093 fg=#1F1F28 bold'
setw -g window-status-style 'bg=default fg=#C8C093'

# F12 nested session toggle (for SSH into another tmux)
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=#C8C093,bg=#2D4F67" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# New session in ~/Projects (falls back to $HOME if missing)
bind S command-prompt -p "session:" "if-shell 'test -d $HOME/Projects' 'new-session -s %1 -c $HOME/Projects' 'new-session -s %1'"

# Git worktree: create worktree + tmux window with prompted name
bind W command-prompt -p "worktree:" "run-shell '$HOME/.local/bin/tmux-worktree %1 #{pane_current_path}'"

# Session switching: prefix + / prebinds session names, then 1-9 switches instantly
bind / run-shell "$HOME/.local/bin/tmux-bind-sessions"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Show [OFF] indicator when keys are off
set -g status-right '#([ $(tmux show-option -qv key-table) = "off" ] && echo " [OFF] ")'
